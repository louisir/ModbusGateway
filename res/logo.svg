<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <clipPath id="app-icon-radius">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112" />
    </clipPath>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B14" />
      <stop offset="100%" stop-color="#0A192F" />
    </linearGradient>
    <linearGradient id="bg-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4DB" />
      <stop offset="100%" stop-color="#0083B0" />
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <g clip-path="url(#app-icon-radius)">
    <polygon points="0,0 512,0 0,512" fill="url(#bg-dark)" />
    
    <polygon points="512,512 512,0 0,512" fill="url(#bg-cyan)" />
    
    <line x1="0" y1="512" x2="512" y2="0" stroke="#FFFFFF" stroke-width="16" />
    
    <text x="165" y="210" font-family="'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="120" font-weight="900" fill="#FFFFFF" text-anchor="middle" filter="url(#drop-shadow)">RTU</text>
    
    <text x="347" y="385" font-family="'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="120" font-weight="900" fill="#0A192F" text-anchor="middle" filter="url(#drop-shadow)">TCP</text>
  </g>
  
  <rect x="4" y="4" width="504" height="504" rx="108" ry="108" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.15" />
</svg>
